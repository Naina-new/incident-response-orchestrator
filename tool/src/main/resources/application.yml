spring:
  application:
    name: incident-response-orchestrator


  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/incident_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration

  data:
    redis:
      host: localhost
      port: 6379

